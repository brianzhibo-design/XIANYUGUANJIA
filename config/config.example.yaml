app:
  name: "xianyu-guanjia"
  version: "9.2.5"
  debug: false
  log_level: "INFO"
  data_dir: "data"
  logs_dir: "logs"
  runtime: "lite"

# 浏览器运行时配置
browser_runtime:
  timeout: 30
  retry_times: 3
ai:
  provider: deepseek
  api_key: ${AI_API_KEY}
  base_url: ${AI_BASE_URL}
  model: ${AI_MODEL}
  temperature: 0.7
  max_tokens: 1000
  fallback_enabled: true
  fallback_model: gpt-3.5-turbo
  usage_mode: minimal
  max_calls_per_run: 20
  cache_ttl_seconds: 900
  cache_max_entries: 200
  task_switches:
    title: false
    description: false
    optimize_title: false
    seo_keywords: false
    quote_extract: false
    express_reply: false
database:
  type: sqlite
  path: data/agent.db
  max_connections: 5
  timeout: 30
accounts:
- id: account_1
  name: 主账号
  cookie: ${XIANYU_COOKIE_1}
  priority: 1
  enabled: true
default_account: account_1
scheduler:
  enabled: false
  timezone: Asia/Shanghai
  polish:
    enabled: true
    cron: 0 9 * * *
  metrics:
    enabled: true
    cron: 0 */4 * * *
media:
  max_image_size: 5242880
  supported_formats:
  - jpg
  - jpeg
  - png
  - webp
  output_format: jpeg
  output_quality: 85
  max_width: 1500
  max_height: 1500
  watermark:
    enabled: false
    text: 闲鱼助手
    position: bottom-right
    font_size: 24
    color: '#FFFFFF'
content:
  title:
    max_length: 25
    min_length: 10
    keywords_enabled: true
  description:
    max_length: 500
    min_length: 50
    structure_enabled: true
  templates:
    enabled: true
    path: config/templates
browser:
  headless: true
  user_agent: ''
  viewport:
    width: 1280
    height: 800
  delay:
    min: 1
    max: 3
  upload_timeout: 60
messages:
  enabled: true
  transport: ws
  ws:
    base_url: wss://wss-goofish.dingtalk.com/
    heartbeat_interval_seconds: 15
    heartbeat_timeout_seconds: 5
    reconnect_delay_seconds: 3.0
    max_reconnect_delay_seconds: 90.0
    message_expire_ms: 300000
    max_queue_size: 200
    queue_wait_seconds: 0.3
    token_refresh_interval_seconds: 3600
    token_retry_seconds: 300
    token_max_attempts: 3
    cookie_watch_interval_seconds: 5.0
    auth_failure_backoff_seconds: 300
    auth_hold_until_cookie_update: true
    slider_auto_solve:
      enabled: true
      max_attempts: 2
      cooldown_seconds: 300
      headless: false
      fingerprint_browser:
        enabled: true
        api_url: http://127.0.0.1:54345
        browser_id: 3213efceee934ab09138ec1100f1c62b
  max_replies_per_run: 10
  fast_reply_enabled: true
  reply_target_seconds: 3.0
  reuse_message_page: true
  first_reply_delay_seconds:
  - 0.25
  - 0.9
  inter_reply_delay_seconds:
  - 0.4
  - 1.2
  send_confirm_delay_seconds:
  - 0.15
  - 0.35
  reply_prefix: ''
  default_reply: 直接拍就行拍完给您兑换码
  virtual_default_reply: 兑换码是兑换余额的，点下单使用余额支付即可
  quote_intent_keywords:
  - 报价
  - 多少钱
  - 价格
  - 运费
  - 邮费
  - 快递费
  - 寄到
  - 发到
  - 送到
  - 怎么寄
  - 怎么收费
  - 多钱
  - 啥价
  - 咋卖
  - 怎么卖
  - 什么价
  - 几块钱
  standard_format_trigger_keywords:
  - 你好
  - 您好
  - 在吗
  - 在不
  - hi
  - hello
  - 哈喽
  - 有人吗
  quote_missing_template: '为了给你报最准确的价格，麻烦提供一下：{fields}

    格式示例：广东省 - 浙江省 - 3kg 30x20x15cm'
  force_non_empty_reply: true
  non_empty_reply_fallback: '发送 寄件城市 - 收件城市 - 重量 就能帮您查最优价格哦~

    示例：广东省 - 浙江省 - 3kg'
  context_memory_enabled: true
  context_memory_ttl_seconds: 3600
  manual_mode_timeout: 600
  courier_lock_template: '已为你锁定 {courier}（{price}，预计{eta_days}）。

    下单流程：

    1. 先拍下链接，先不要付款；

    2. 我改价后你再付款；

    3. 付款后系统自动发放兑换码，用兑换码到小橙序下单即可。

    付款后的地址和手机号在小橙序填写，这里无需提供。

    提醒：以上为参考价，首次使用小橙序的手机号可享额外优惠哦~'
  strict_format_reply_enabled: true
  quote_reply_all_couriers: true
  quote_reply_max_couriers: 10
  quote_failed_template: 报价服务暂时繁忙，我先帮您转人工确认，确保价格准确。
  virtual_product_keywords:
  - 虚拟
  - 卡密
  - 激活码
  - 兑换码
  - CDK
  - 代下单
  - 代充
  - 代订
  intent_rules:
  - name: card_code_delivery
    priority: 10
    keywords:
    - 卡密
    - 兑换码
    - 激活码
    - CDK
    - 授权码
    - 序列号
    reply: 这是虚拟商品，付款后会通过平台聊天发卡密/兑换信息，请按商品说明使用。
  - name: online_fulfillment
    priority: 20
    keywords:
    - 代下单
    - 代拍
    - 代充
    - 代购
    - 代订
    reply: 支持代下单服务，请把具体需求、数量和时效发我，我确认后马上安排。
  - name: delivery_eta
    priority: 30
    keywords:
    - 多久发
    - 发货时间
    - 什么时候发
    - 多久到账
    patterns:
    - \d+\s*分钟
    - \d+\s*小时
    reply: 虚拟商品通常付款后几分钟内处理，高峰期会稍有延迟，我会尽快给你。
  keyword_replies:
    还在: 在的亲~ 告诉我寄件城市、收件城市和重量，帮您查最优价~
    怎么买: 直接拍就行拍完给您兑换码
    怎么用: 兑换码是兑换余额的，点下单使用余额支付即可
    上门取件: 下单后联系快递员沟通好上门取件时间哈，也可以搜索小程序预约上门取件
    小程序下单: 在小程序搜索并点击进入 → 右下角「我的」→「兑换优惠」兑换余额 → 返回首页填写寄件和收件地址、选快递公司 → 用余额支付下单即可（小程序名称在 Dashboard 设置中配置）
    包装费: 包装费需要下单后问下快递员哈，这个属于耗材费，是他这边收取的
    最低: 价格已经尽量实在了，诚心要的话可以小刀。
  workflow:
    db_path: data/workflow.db
    poll_interval_seconds: 1.0
    scan_limit: 20
    claim_limit: 10
    lease_seconds: 60
    max_attempts: 3
    backoff_seconds: 2
    sla:
      window_minutes: 60
      min_samples: 5
      reply_p95_threshold_ms: 3000
      quote_success_rate_threshold: 0.98
    notifications:
      feishu:
        enabled: false
        webhook: ${FEISHU_BOT_WEBHOOK}
        notify_on_start: false
        notify_on_alert: true
        notify_recovery: true
        heartbeat_minutes: 30
        bot_name: 闲鱼自动化助手
  ai_intent_enabled: true
quote:
  enabled: true
  mode: cost_table_plus_markup
  ttl_seconds: 90
  max_stale_seconds: 300
  timeout_ms: 3000
  retry_times: 2
  circuit_fail_threshold: 3
  circuit_open_seconds: 30
  safety_margin: 0.03
  validity_minutes: 30
  analytics_log_enabled: true
  pricing_profile: normal
  cost_table_dir: data/quote_costs
  cost_table_patterns:
  - '*.xlsx'
  - '*.csv'
  cost_api_url: ''
  cost_api_key_env: QUOTE_COST_API_KEY
  remote_api_url: ''
  remote_api_key_env: QUOTE_API_KEY
  api_fallback_to_table_parallel: true
  api_prefer_max_wait_seconds: 1.2
  volume_divisor_default: 8000
  markup_rules:
    default:
      normal_first_add: 0.5
      member_first_add: 0.25
      normal_extra_add: 0.5
      member_extra_add: 0.3
  markup_categories:
    线上快递:
      default:
        first_add: 0.9
        extra_add: 0.7
      圆通:
        first_add: 0.9
        extra_add: 0.7
      韵达:
        first_add: 1.2
        extra_add: 0.7
      中通:
        first_add: 1.2
        extra_add: 0.7
      申通:
        first_add: 1.2
        extra_add: 0.7
      菜鸟裹裹:
        first_add: 0.9
        extra_add: 0.7
      极兔:
        first_add: 0.9
        extra_add: 0.7
      德邦:
        first_add: 1.2
        extra_add: 0.7
      顺丰:
        first_add: 1.2
        extra_add: 0.7
      京东:
        first_add: 1.2
        extra_add: 0.7
      邮政:
        first_add: 0.6
        extra_add: 0.7
    线上快运:
      default:
        first_add: 8.0
        extra_add: 0.45
      百世快运:
        first_add: 8.0
        extra_add: 0.45
      跨越速运:
        first_add: 8.0
        extra_add: 0.45
      壹米滴答:
        first_add: 8.0
        extra_add: 0.45
      顺心捷达:
        first_add: 8.0
        extra_add: 0.45
      中通快运:
        first_add: 8.0
        extra_add: 0.45
      德邦快运:
        first_add: 9.0
        extra_add: 0.45
      安能:
        first_add: 8.0
        extra_add: 0.45
  xianyu_discount:
    线上快递:
      default:
        first_discount: 0.0
        extra_discount: 0.0
    线上快运:
      default:
        first_discount: 0.0
        extra_discount: 0.0
  providers:
    remote:
      enabled: false
      allow_mock: false
      simulated_latency_ms: 120
      failure_rate: 0.0
rules:
  path: config/rules.yaml
store:
  category: express
