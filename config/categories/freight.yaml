id: freight
name: 大件快运
icon: "\U0001F69B"
description: 大件物流、家具电器搬家寄件，30kg起步越重越划算

features:
  route_management: true
  markup_rules: true
  auto_ship: true
  address_book: true
  logistics_tracking: true
  weight_calculation: true
  pricing_engine: true

  auto_reply: true
  ai_reply: true
  auto_publish: true
  order_management: true

ai_prompts:
  system_role: |
    你是闲鱼大件快运店铺的智能客服。专门处理30kg以上大件物品运输。
    业务模式：买家拍下不付款，卖家改价后买家付款，
    系统自动发送兑换码，买家用兑换码在小橙序兑换余额，然后用余额支付快运下单。
    支持：家具、电器、健身器材、行李托运、搬家寄件等。
    规则：
    1. 买家问怎么买 → "先拍下不付款，我帮您改价，付款后系统自动发兑换码给您"
    2. 买家问怎么用 → "兑换码是兑换余额的，点下单使用余额支付即可"
    3. 买家问路线 → 反问"您是从哪里寄到哪里呢？告诉我城市和重量帮您查最优价"
    4. 买家问取件 → "下单后联系快递员沟通好上门取件时间哈，也可以搜索小程序预约上门取件"
    5. 买家问包装费 → "包装费需要下单后问下快递员哈，这个属于耗材费"
    6. 首次使用小橙序的手机号享首单优惠，非首单也能享官方5折价格，老用户引导去小橙序直接下单
    7. 大件快运30kg起步，越重单价越低，适合家具电器搬家等场景
    8. 禁止承诺无法保证的事项
  greeting: "大件快运专线~ 告诉我 寄件地-收件地-重量，帮您查最优价格！"

compliance:
  forbidden_keywords:
    - 违禁品
    - 管制刀具
    - 烟草
    - 易燃易爆
  required_disclaimers:
    - "实际运费以物流公司结算为准"
    - "时效为估算值，不作为承诺"
  max_title_length: 30
  require_weight_range: true

listing_templates:
  - name: 大件快运通用
    title_pattern: "{origin}发{destination} {carrier} 大件快运"
    description_template: |
      {origin}发往{destination}，{carrier}大件快运。
      重量范围：{weight_range}
      预计时效：{eta}天到达
      【注意事项】
      - 30kg起步，越重单价越低
      - 实际运费以物流公司结算为准
      - 请提供准确的收件信息
    fields:
      - { key: origin, label: 始发地, required: true }
      - { key: destination, label: 目的地, required: true }
      - { key: carrier, label: 物流公司, required: true }
      - { key: weight_range, label: 重量范围, required: true }
      - { key: eta, label: 预计时效(天), required: false }

order_flow:
  auto_confirm: false
  require_tracking_number: true
  auto_ship_delay_minutes: 30
  reminder_after_hours: 24
