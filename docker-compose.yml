services:
  postgres:
    image: postgres:16-alpine
    container_name: xianyu-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-code_review_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  node-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: xianyu-node-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${NODE_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-code_review_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped

  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: xianyu-python-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PYTHON_PORT:-8091}:8091"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
    restart: unless-stopped

  react-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: xianyu-react-frontend
    depends_on:
      - node-backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  pgdata:
