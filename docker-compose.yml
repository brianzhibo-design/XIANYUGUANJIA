services:
  node-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: xianyu-node-backend
    ports:
      - "${NODE_PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - node-data:/app/data
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: xianyu-python-backend
    ports:
      - "${PYTHON_PORT:-8091}:8091"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  react-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_NODE_API_URL: ${VITE_NODE_API_URL:-/api}
        VITE_PY_API_URL: ${VITE_PY_API_URL:-/py}
    container_name: xianyu-react-frontend
    depends_on:
      node-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  node-data:
