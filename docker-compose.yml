# 国内环境构建: MIRROR=china docker compose build
#
# Docker 镜像加速（国内拉取基础镜像）:
#   编辑 /etc/docker/daemon.json 添加:
#   { "registry-mirrors": ["https://mirror.ccs.tencentyun.com"] }
#   然后 sudo systemctl restart docker

services:
  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        MIRROR: ${MIRROR:-international}
    container_name: xianyu-python-backend
    ports:
      - "${PYTHON_PORT:-8091}:8091"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8091/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  react-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        MIRROR: ${MIRROR:-international}
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: xianyu-react-frontend
    depends_on:
      python-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
