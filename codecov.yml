codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...85"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        paths:
          - "src"
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: 70%
        threshold: 5%
        paths:
          - "src"
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

ignore:
  - "tests/**/*"
  - "**/test_*.py"
  - "**/conftest.py"
  - "src/**/__pycache__/**/*"
  - "client/**/*"
  - "scripts/**/*"
  - "examples/**/*"
  - "docs/**/*"
