name: ✨ 功能请求
description: 建议一个新功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的想法。

  - type: textarea
    id: problem
    attributes:
      label: 问题/需求
      description: 你的功能请求解决了什么问题
      placeholder: 我希望能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述你想要的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他解决方案

  - type: textarea
    id: context
    attributes:
      label: 附加信息
      description: 任何其他上下文或截图
