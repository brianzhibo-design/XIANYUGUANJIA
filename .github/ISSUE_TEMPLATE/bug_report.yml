name: 🐛 Bug 报告
description: 报告一个 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的 bug 报告！请填写以下信息帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 bug
      placeholder: 发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 相关的日志或截图
      render: shell

  - type: input
    id: version
    attributes:
      label: 版本
      description: 你使用的版本
      placeholder: v6.3.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Python 版本
      options:
        - "3.12"
        - "3.13"
        - "其他"
